name: 🤖 El Ashry Pro Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"
  push:
    branches:
      - main

# ✅ منع تشغيل أكثر من بوت في نفس الوقت - يحل مشكلة تكرار الردود
concurrency:
  group: el-ashry-bot-single
  cancel-in-progress: true

jobs:
  run-bot:
    name: 🚀 تشغيل البوت
    runs-on: ubuntu-latest
    timeout-minutes: 290

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ""

      - name: 📦 Install Dependencies
        run: npm install

      - name: ⏳ انتظار إيقاف النسخة السابقة
        run: |
          echo "⏳ انتظار 15 ثانية للتأكد من إيقاف أي نسخة سابقة..."
          sleep 15
          echo "✅ جاهز للتشغيل"

      - name: 🤖 Run Bot
        env:
          BOT_TOKEN:    ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID:   ${{ secrets.CHANNEL_ID }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
        run: node bot.js

      - name: ⚠️ Bot Stopped
        if: failure()
        run: echo "❌ البوت وقف - سيعيد التشغيل في الدورة القادمة"

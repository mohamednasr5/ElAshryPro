name: 🤖 El Ashry Pro Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"
  push:
    branches:
      - main

jobs:
  run-bot:
    name: 🚀 تشغيل البوت
    runs-on: ubuntu-latest
    timeout-minutes: 290

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # ❌ شيلنا cache: npm عشان هو اللي بيطلب lock file

      - name: 📦 Install Dependencies
        run: npm install
        # ✅ npm install مش محتاج package-lock.json

      - name: 🤖 Run Bot
        env:
          BOT_TOKEN:    ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID:   ${{ secrets.CHANNEL_ID }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
        run: node elashry_bot.js

      - name: ⚠️ Bot Stopped
        if: failure()
        run: echo "❌ البوت وقف - سيعيد التشغيل في الدورة القادمة"

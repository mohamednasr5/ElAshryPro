name: Telegram Bot

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */5 * * *'

# ─── هذا يمنع تشغيل أكثر من workflow في نفس الوقت ───
concurrency:
  group: telegram-bot-singleton
  cancel-in-progress: true

jobs:
  run-bot:
    name: Run Telegram Bot
    runs-on: ubuntu-latest
    timeout-minutes: 310

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin requests python-dotenv

      # ─── إيقاف أي بوت قديم وتنظيف الـ queue ──────────
      - name: Kill old bot sessions
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          python - <<'PYEOF'
import requests, os, time

token = os.environ["BOT_TOKEN"]
api = f"https://api.telegram.org/bot{token}"

# إلغاء أي webhook وحذف كل الرسائل المعلقة دفعة واحدة
requests.post(f"{api}/deleteWebhook", json={"drop_pending_updates": True}, timeout=15)
print("✅ تم حذف الـ webhook والرسائل المعلقة")

time.sleep(3)

# تخطي أي updates متبقية
r = requests.get(f"{api}/getUpdates", params={"timeout": 1, "limit": 100}, timeout=10)
updates = r.json().get("result", [])
if updates:
    last_id = updates[-1]["update_id"]
    requests.get(f"{api}/getUpdates", params={"offset": last_id + 1, "timeout": 1}, timeout=10)
    print(f"✅ تم تخطي {len(updates)} رسالة قديمة")
else:
    print("✅ لا توجد رسائل معلقة")

print("🚀 البوت جاهز للتشغيل")
PYEOF

      # ─── تشغيل البوت ────────────────────────────────────
      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          FIREBASE_PATH: ${{ secrets.FIREBASE_PATH }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
        run: python bot.py

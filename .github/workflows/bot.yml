name: Telegram Bot

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # إعادة تشغيل تلقائية كل 5 ساعات
    - cron: '0 */5 * * *'

jobs:
  run-bot:
    name: Run Telegram Bot
    runs-on: ubuntu-latest
    timeout-minutes: 310  # أقل بقليل من 5 ساعات (GitHub Actions يوقف بعد 6 ساعات)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin requests python-dotenv

      # ─── إيقاف أي بوت قديم شغال ───────────────────────────
      - name: Kill any running bot (close old sessions)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          echo "🛑 إيقاف أي session قديم للبوت..."
          python - <<'PYEOF'
import requests, os, time

token = os.environ["BOT_TOKEN"]
api = f"https://api.telegram.org/bot{token}"

# إلغاء أي webhook قديم وتنظيف الـ pending updates
requests.post(f"{api}/deleteWebhook", json={"drop_pending_updates": True}, timeout=15)
print("✅ تم إلغاء الـ webhook وحذف الرسائل المعلقة")

# انتظار ثانيتين للتأكد
time.sleep(2)

# جلب آخر update_id لتخطي كل الرسائل القديمة
r = requests.get(f"{api}/getUpdates", params={"timeout": 1, "limit": 100}, timeout=10)
updates = r.json().get("result", [])
if updates:
    last_id = updates[-1]["update_id"]
    # تأكيد استلام كل الرسائل القديمة
    requests.get(f"{api}/getUpdates", params={"offset": last_id + 1, "timeout": 1}, timeout=10)
    print(f"✅ تم تخطي {len(updates)} رسالة قديمة (آخر ID: {last_id})")
else:
    print("✅ لا توجد رسائل قديمة")

print("🚀 جاهز لتشغيل البوت الجديد")
PYEOF

      # ─── تشغيل البوت ───────────────────────────────────────
      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          FIREBASE_PATH: ${{ secrets.FIREBASE_PATH }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
        run: |
          echo "🤖 تشغيل البوت..."
          python bot.py

name: Telegram Bot

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-bot:
    name: Run Telegram Bot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp python-telegram-bot firebase-admin requests python-dotenv

      - name: Debug Info
        run: |
          python --version
          pip list | grep -E "aiohttp|firebase|requests|telegram"

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          FIREBASE_PATH: ${{ secrets.FIREBASE_PATH }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
        run: python bot.py
